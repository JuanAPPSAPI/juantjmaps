            // ==================== FOTOS ====================
            photoInput.addEventListener('change', async function() {
                const file = this.files[0];
                if (!file) return;
                const markerId = state._pendingPhotoMarkerId;
                if (!markerId) return;
                try {
                    // Redimensionar imagen
                    const resized = await resizeImage(file, 600);
                    const formData = new FormData();
                    formData.append('photo', resized, 'photo.jpg');
                    const data = await apiCall(`/markers/${markerId}/photos`, 'POST', formData, true);
                    const idx = state.markers.findIndex(x => x.id === markerId);
                    if (idx >= 0 && data.marker) state.markers[idx] = data.marker;
                    loadMarkers();
                    if (state.selectedMarker && state.selectedMarker.id === markerId) {
                        state.selectedMarker = state.markers.find(x => x.id === markerId);
                        openMarkerDetailSheet(state.selectedMarker);
                    }
                    showSnackbar('Foto añadida');
                } catch (err) {
                    showSnackbar('Error: ' + err.message);
                }
                this.value = '';
                state._pendingPhotoMarkerId = null;
            });

            function resizeImage(file, maxSize) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width,
                                h = img.height;
                            if (w > h && w > maxSize) { h = h * (maxSize / w);
                                w = maxSize; } else if (h > maxSize) { w = w * (maxSize / h);
                                h = maxSize; }
                            canvas.width = w;
                            canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            canvas.toBlob((blob) => resolve(new File([blob], 'photo.jpg', { type: 'image/jpeg' })),
                                'image/jpeg', 0.8);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }            // ==================== REALIDAD AUMENTADA (SOLUCIÓN DEFINITIVA) ====================
            function openARView() {
                if (state.arActive) return;
                arOverlay.classList.add('active');
                state.arActive = true;
                startARCamera();
            }

            function closeARView() {
                state.arActive = false;
                arOverlay.classList.remove('active');
                if (state.arAnimationId) cancelAnimationFrame(state.arAnimationId);
                if (arVideo.srcObject) {
                    arVideo.srcObject.getTracks().forEach(t => t.stop());
                    arVideo.srcObject = null;
                }
            }

            async function requestDeviceOrientationPermission() {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState !== 'granted') {
                            console.warn('Permiso de orientación denegado');
                            return false;
                        }
                    } catch (error) {
                        console.error('Error al pedir permiso de orientación:', error);
                        return false;
                    }
                }
                return true;
            }

            async function startARCamera() {
                try {
                    await requestDeviceOrientationPermission();
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    arVideo.srcObject = stream;
                    await arVideo.play();
                    initAROverlay();
                } catch (err) {
                    showSnackbar('Error al acceder a la cámara: ' + err.message);
                    console.error('Error cámara:', err);
                    closeARView();
                }
            }

            function initAROverlay() {
                const canvas = arCanvas;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let currentLat = null;
                let currentLng = null;
                let heading = 0;
                const markersNearby = [];
                let locationAvailable = false;
                let hasAbsoluteHeading = false;      // true solo si tenemos brújula real
                let orientationAvailable = false;    // para mostrar estado en panel
                let calibrationInstruction = '';
                let lastHeading = null;
                let headingStableCount = 0;
                let sensorActive = false;

                // ----- SENSOR DE ORIENTACIÓN ABSOLUTA (API moderna, prioridad máxima) -----
                async function startAbsoluteSensor() {
                    if (sensorActive) return;
                    if ('AbsoluteOrientationSensor' in window) {
                        try {
                            const sensor = new AbsoluteOrientationSensor({ frequency: 60 });
                            sensor.addEventListener('reading', () => {
                                const q = sensor.quaternion;
                                const yaw = Math.atan2(2*q[0]*q[1] + 2*q[2]*q[3], 1 - 2*q[1]*q[1] - 2*q[2]*q[2]);
                                heading = ((yaw * 180 / Math.PI) + 360) % 360;
                                hasAbsoluteHeading = true;
                                orientationAvailable = true;
                                calibrationInstruction = '';
                                console.log('AbsoluteOrientationSensor heading:', heading);
                            });
                            sensor.addEventListener('error', (event) => {
                                console.error('Error en AbsoluteOrientationSensor:', event.error);
                                sensorActive = false;
                            });
                            sensor.start();
                            sensorActive = true;
                            console.log('AbsoluteOrientationSensor iniciado');
                            return true;
                        } catch (err) {
                            console.error('No se pudo iniciar AbsoluteOrientationSensor:', err);
                            return false;
                        }
                    }
                    return false;
                }

                // ----- GEOLOCALIZACIÓN -----
                if (navigator.geolocation) {
                    console.log('Iniciando watchPosition...');
                    navigator.geolocation.watchPosition(
                        (pos) => {
                            currentLat = pos.coords.latitude;
                            currentLng = pos.coords.longitude;
                            locationAvailable = true;
                            console.log('📍 Ubicación actualizada:', currentLat.toFixed(6), currentLng.toFixed(6));
                            updateNearbyMarkers();
                        },
                        (err) => {
                            console.error('Error GPS:', err.message);
                            if (!locationAvailable) {
                                navigator.geolocation.getCurrentPosition(
                                    (pos) => { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; locationAvailable = true; updateNearbyMarkers(); },
                                    () => {},
                                    { enableHighAccuracy: true, timeout: 10000 }
                                );
                            }
                        },
                        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
                    );
                    navigator.geolocation.getCurrentPosition(
                        (pos) => { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; locationAvailable = true; updateNearbyMarkers(); },
                        () => {},
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                }

                // ----- EVENTOS DE ORIENTACIÓN (FALLBACK) -----
                const orientationHandler = (event) => {
                    // Si el sensor absoluto ya está activo, no hacemos nada con eventos
                    if (sensorActive) return;

                    console.log('Evento orientación:', event.type, '| alpha:', event.alpha?.toFixed(1), '| absolute:', event.absolute);

                    // 1. WebKit compass heading (iOS, algunos Android)
                    if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== -1) {
                        heading = event.webkitCompassHeading;
                        hasAbsoluteHeading = true;
                        orientationAvailable = true;
                        calibrationInstruction = '';
                        console.log('Brújula WebKit:', heading);
                        return;
                    }
                    // 2. evento deviceorientationabsolute (poco común)
                    if (event.type === 'deviceorientationabsolute' && event.alpha !== null) {
                        heading = event.alpha;
                        hasAbsoluteHeading = true;
                        orientationAvailable = true;
                        calibrationInstruction = '';
                        console.log('Brújula absoluta (evento):', heading);
                        return;
                    }
                    // 3. deviceorientation con absolute === true
                    if (event.type === 'deviceorientation' && event.alpha !== null && event.absolute === true) {
                        heading = event.alpha;
                        hasAbsoluteHeading = true;
                        orientationAvailable = true;
                        calibrationInstruction = '';
                        console.log('Brújula absoluta (propiedad absolute):', heading);
                        return;
                    }
                    // 4. Giroscopio relativo (sin brújula): NO actualizamos heading ni orientationAvailable
                    if (event.type === 'deviceorientation' && event.alpha !== null) {
                        // Solo mostramos mensaje de calibración, sin modificar heading
                        calibrationInstruction = '🔴 Mueve el móvil en forma de ∞ para calibrar';
                        console.log('Solo giroscopio relativo – no se usa para rumbo');
                        // Si queremos podríamos guardar un heading relativo en otra variable, pero no lo usamos para dibujar
                    }
                };

                window.addEventListener('deviceorientation', orientationHandler, true);
                window.addEventListener('deviceorientationabsolute', orientationHandler, true);
                window.addEventListener('compassneedscalibration', () => {
                    calibrationInstruction = '🔴 La brújula necesita calibración. Mueve el móvil en forma de ∞';
                    showSnackbar('Calibra la brújula moviendo el teléfono en forma de 8');
                });

                // Iniciar sensor absoluto (API moderna)
                startAbsoluteSensor().then(active => {
                    if (!active) {
                        console.log('AbsoluteOrientationSensor no disponible, usando eventos');
                    }
                });

                // Timeout de emergencia: después de 10s sin brújula, mostramos mensaje pero NO forzamos heading
                setTimeout(() => {
                    if (!hasAbsoluteHeading) {
                        calibrationInstruction = '⚠️ Sin brújula. Usa GPS en movimiento o botón "Fijar Norte".';
                        console.warn('Sin brújula después de 10 segundos');
                    }
                }, 10000);

                function updateNearbyMarkers() {
                    if (!currentLat || !currentLng) return;
                    markersNearby.length = 0;
                    const currentMarkers = state.markers.filter(m => m.territory_id === state.currentTerritoryId);
                    currentMarkers.forEach(m => {
                        const dist = getDistance(currentLat, currentLng, m.lat, m.lng);
                        if (dist <= 5000) {
                            const bearing = getBearing(currentLat, currentLng, m.lat, m.lng);
                            markersNearby.push({ ...m, distance: dist, bearing });
                        }
                    });
                    markersNearby.sort((a, b) => a.distance - b.distance);
                }

                function renderAR() {
                    if (!state.arActive) return;
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Panel de estado
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(10, 10, 270, 110);
                    ctx.fillStyle = 'white';
                    ctx.font = '12px Roboto, sans-serif';
                    ctx.textAlign = 'left';
                    const gpsText = locationAvailable ? '✅ GPS: Activo' : '⏳ GPS: Buscando...';
                    const compassText = hasAbsoluteHeading ? `🧭 Brújula: ${Math.round(heading)}°` : '🔄 Brújula: Calibrando...';
                    ctx.fillText(gpsText, 20, 30);
                    ctx.fillText(compassText, 20, 50);
                    ctx.fillText(`📌 Marcadores: ${markersNearby.length}`, 20, 70);
                    if (calibrationInstruction) {
                        ctx.fillStyle = '#FFD600';
                        ctx.fillText(calibrationInstruction, 20, 95);
                    }

                    if (locationAvailable && currentLat && currentLng) {
                        const fov = 70;
                        const halfFov = fov / 2;

                        if (!hasAbsoluteHeading) {
                            ctx.fillStyle = 'rgba(255,255,255,0.9)';
                            ctx.font = '18px Roboto, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillText('🧭 Calibrando brújula...', canvas.width/2, canvas.height/2 - 20);
                            ctx.fillText('Mueve el móvil dibujando un 8 en el aire', canvas.width/2, canvas.height/2 + 10);
                            ctx.font = '12px Roboto';
                            ctx.fillText('(Si no funciona, usa el botón Fijar Norte)', canvas.width/2, canvas.height/2 + 35);
                        } else if (markersNearby.length === 0) {
                            ctx.fillStyle = 'rgba(255,255,255,0.9)';
                            ctx.font = '16px Roboto, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillText('No hay marcadores en esta dirección', canvas.width/2, canvas.height/2);
                            ctx.fillText('Gira el dispositivo para explorar', canvas.width/2, canvas.height/2 + 25);
                        }

                        // Solo dibujar marcadores si hay rumbo absoluto
                        if (hasAbsoluteHeading) {
                            markersNearby.forEach(m => {
                                let relBearing = m.bearing - heading;
                                if (relBearing > 180) relBearing -= 360;
                                if (relBearing < -180) relBearing += 360;
                                if (Math.abs(relBearing) < halfFov) {
                                    const xPercent = 0.5 + (relBearing / halfFov) * 0.5;
                                    const x = canvas.width * xPercent;
                                    const y = canvas.height * 0.55;
                                    const maxDist = 5000;
                                    const opacity = Math.max(0.3, 1 - m.distance / maxDist);
                                    const scale = Math.max(0.6, 1 - m.distance / maxDist);

                                    ctx.save();
                                    ctx.globalAlpha = opacity;
                                    ctx.translate(x, y);
                                    ctx.scale(scale, scale);

                                    const cat = state.categories.find(c => c.id === m.category_id);
                                    const color = cat ? cat.color : '#386a20';
                                    ctx.beginPath();
                                    ctx.arc(0, 0, 18, 0, Math.PI * 2);
                                    ctx.fillStyle = color;
                                    ctx.fill();
                                    ctx.strokeStyle = 'white';
                                    ctx.lineWidth = 2;
                                    ctx.stroke();

                                    ctx.fillStyle = 'white';
                                    ctx.font = 'bold 11px Roboto, sans-serif';
                                    ctx.textAlign = 'center';
                                    ctx.fillText((m.name || 'Lugar').substring(0, 20), 0, 32);
                                    ctx.font = '10px Roboto, sans-serif';
                                    ctx.fillText(Math.round(m.distance) + 'm', 0, 46);

                                    ctx.restore();
                                }
                            });

                            ctx.fillStyle = 'rgba(0,0,0,0.5)';
                            ctx.fillRect(canvas.width - 80, 10, 70, 50);
                            ctx.fillStyle = 'white';
                            ctx.font = 'bold 14px Roboto';
                            ctx.textAlign = 'center';
                            ctx.fillText(Math.round(heading) + '° N', canvas.width - 45, 40);
                        }
                    } else {
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.font = '16px Roboto, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('Obteniendo ubicación GPS...', canvas.width/2, canvas.height/2);
                        ctx.fillText('Asegúrate de tener activado el GPS', canvas.width/2, canvas.height/2 + 25);
                    }

                    state.arAnimationId = requestAnimationFrame(renderAR);
                }

                renderAR();
            }

            function getDistance(lat1, lng1, lat2, lng2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function getBearing(lat1, lng1, lat2, lng2) {
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
                const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                    Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
                let brng = Math.atan2(y, x) * 180 / Math.PI;
                return (brng + 360) % 360;
            }
            // ==================== EVENT LISTENERS ====================
            $('#btnLogin').addEventListener('click', async () => {
                const u = $('#loginUser').value.trim();
                const p = $('#loginPass').value.trim();
                if (!u || !p) return showSnackbar('Completa todos los campos');
                try {
                    await login(u, p);
                    hideLoginScreen();
                    await loadAllData();
                    initMap();
                    updateTerritoryChip();
                    showSnackbar('Bienvenido, ' + state.user.username);
                } catch (err) {
                    showSnackbar('Error de login: ' + err.message);
                }
            });

            $('#btnMenu').addEventListener('click', toggleDrawer);
            scrim.addEventListener('click', closeDrawer);
            $('#chipTerritory').addEventListener('click', showTerritorySelector);
            $('#btnCenterMap').addEventListener('click', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        state.map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                    });
                }
            });
            $('#fabAdd').addEventListener('click', () => {
                if (!state.isAdmin) return showSnackbar('Solo administradores pueden añadir marcadores');
                if (!state.currentTerritoryId) return showSnackbar('Selecciona un territorio primero');
                const center = state.map.getCenter();
                showAddMarkerModal(center);
            });
            $('#fabAR').addEventListener('click', openARView);
            $('#btnARClose').addEventListener('click', closeARView);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) hideModal();
            });
            bottomSheet.querySelector('.bottom-sheet-handle').addEventListener('click', closeBottomSheet);

            // Navegación del drawer
            $$('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const action = item.dataset.action;
                    closeDrawer();
                    switch (action) {
                        case 'map':
                            break;
                        case 'territories':
                            showTerritorySelector();
                            break;
                        case 'categories':
                            showCategoriesManager();
                            break;
                        case 'customFields':
                            showCustomFieldsManager();
                            break;
                        case 'arView':
                            openARView();
                            break;
                        case 'logout':
                            logout();
                            break;
                    }
                });
            });

            // ==================== INICIALIZACIÓN ====================
            async function loadAllData() {
                await Promise.all([loadTerritories(), loadCategories(), loadCustomFields()]);
                if (state.currentTerritoryId) {
                    try {
                        const data = await apiCall(`/territories/${state.currentTerritoryId}/markers`);
                        state.markers = data.markers;
                    } catch (e) {
                        state.markers = [];
                    }
                }
            }

            async function tryAutoLogin() {
                const savedToken = localStorage.getItem('juanTJMaps_token');
                const savedUser = localStorage.getItem('juanTJMaps_user');
                if (savedToken && savedUser) {
                    try {
                        state.token = savedToken;
                        state.user = JSON.parse(savedUser);
                        state.isAdmin = state.user.role === 'admin';
                        updateNavUserInfo();
                        await loadAllData();
                        hideLoginScreen();
                        initMap();
                        updateTerritoryChip();
                        return true;
                    } catch (e) {
                        localStorage.removeItem('juanTJMaps_token');
                        localStorage.removeItem('juanTJMaps_user');
                    }
                }
                return false;
            }

            // Inicio
            async function bootstrap() {
                const autoLogged = await tryAutoLogin();
                if (!autoLogged) {
                    showLoginScreen();
                }
                // Ocultar splash
                setTimeout(() => {
                    splash.classList.add('hidden');
                    setTimeout(() => splash.remove(), 500);
                }, 1200);
            }

            bootstrap();

            // Exponer funciones al scope global para callbacks inline
            window._selectTerritory = window._selectTerritory || function(id) {};
            window._showAddTerritory = window._showAddTerritory || function() {};
            window._deleteCategory = window._deleteCategory || function(id) {};
            window._deleteCustomField = window._deleteCustomField || function(id) {};
            window._openMarkerDetail = window._openMarkerDetail || function(id) {};
            window._viewPhoto = window._viewPhoto || function(src) {};
            window._addPhotoToMarker = window._addPhotoToMarker || function(id) {};
            window._editMarker = window._editMarker || function(id) {};
            window._deleteMarker = window._deleteMarker || function(id) {};

            console.log('🗺️ JuanTJMaps inicializado');
            console.log('📱 Material Design 3 | 🌍 Leaflet Maps | 📷 RA integrada');
            console.log('🔑 Roles: Admin (crear/editar/eliminar) | Invitado (solo ver)');
        })();
    </script>
